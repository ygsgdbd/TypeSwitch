name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      
      - name: Install Tuist
        run: |
          brew install tuist
      
      - name: Generate Xcode Project
        run: |
          # 生成基于时间戳的构建号（格式：YYYYMMDDHHmm）
          BUILD_NUMBER=$(date "+%Y%m%d%H%M")
          # 替换 Project.swift 中的占位符
          sed -i '' "s/@BUILD_NUMBER@/$BUILD_NUMBER/g" Project.swift
          echo "Build number set to: $BUILD_NUMBER"
          tuist generate --no-open
      
      - name: Archive App
        run: |
          xcodebuild \
            -workspace TypeSwitch.xcworkspace \
            -scheme TypeSwitch \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath ./DerivedData/Archives/TypeSwitch.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      
      - name: Package App
        run: |
          mkdir -p DerivedData/Exports
          ditto DerivedData/Archives/TypeSwitch.xcarchive/Products/Applications/TypeSwitch.app DerivedData/Exports/TypeSwitch.app
          cd DerivedData/Exports
          ditto -c -k --sequesterRsrc --keepParent TypeSwitch.app ../../TypeSwitch-macOS-universal.zip
      
      - name: Generate Checksums
        run: |
          echo "### TypeSwitch ${{ github.ref_name }}" > checksums.txt
          echo "" >> checksums.txt
          echo "- Universal Binary (Apple Silicon + Intel)" >> checksums.txt
          echo "- macOS 14.0+" >> checksums.txt
          echo "" >> checksums.txt
          echo "### SHA-256 Checksums" >> checksums.txt
          echo "\`\`\`" >> checksums.txt
          shasum -a 256 TypeSwitch-macOS-universal.zip >> checksums.txt
          echo "\`\`\`" >> checksums.txt
      
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            TypeSwitch-macOS-universal.zip
            checksums.txt
          body_path: checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
