name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      
      - name: Install Tuist
        run: |
          brew install tuist
      
      - name: Generate Xcode Project
        run: |
          # 生成基于时间戳的构建号（格式：YYYYMMDDHHmm）
          BUILD_NUMBER=$(date "+%Y%m%d%H%M")
          # 替换 Project.swift 中的占位符
          sed -i '' "s/@BUILD_NUMBER@/$BUILD_NUMBER/g" Project.swift
          echo "Build number set to: $BUILD_NUMBER"
          tuist generate --no-open
      
      - name: Archive App
        run: |
          xcodebuild \
            -workspace TypeSwitch.xcworkspace \
            -scheme TypeSwitch \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath ./DerivedData/Archives/TypeSwitch.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      
      - name: Package App
        run: |
          mkdir -p DerivedData/Exports
          ditto DerivedData/Archives/TypeSwitch.xcarchive/Products/Applications/TypeSwitch.app DerivedData/Exports/TypeSwitch.app
          cd DerivedData/Exports
          ditto -c -k --sequesterRsrc --keepParent TypeSwitch.app ../../TypeSwitch-macOS-universal.zip
      
      - name: Generate Checksums
        run: |
          echo "### TypeSwitch ${{ github.ref_name }}" > checksums.txt
          echo "" >> checksums.txt
          echo "- Universal Binary (Apple Silicon + Intel)" >> checksums.txt
          echo "- macOS 14.0+" >> checksums.txt
          echo "" >> checksums.txt
          echo "### SHA-256 Checksums" >> checksums.txt
          echo "\`\`\`" >> checksums.txt
          shasum -a 256 TypeSwitch-macOS-universal.zip >> checksums.txt
          echo "\`\`\`" >> checksums.txt
      
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            TypeSwitch-macOS-universal.zip
            checksums.txt
          body_path: checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha')
        with:
          repository: ygsgdbd/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha')
        env:
          ASSET_NAME: TypeSwitch-macOS-universal.zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "$ASSET_NAME" | awk '{print $1}')
          CASK_PATH="homebrew-tap/Casks/typeswitch.rb"

          export VERSION SHA256 CASK_PATH
          ruby <<'RUBY'
          path = ENV.fetch("CASK_PATH")
          content = File.read(path)
          content.gsub!(/version ".*"/, "version \"#{ENV.fetch("VERSION")}\"")
          content.gsub!(/sha256 ".*"/, "sha256 \"#{ENV.fetch("SHA256")}\"")
          content.gsub!(%r{url ".*"}, "url \"https://github.com/ygsgdbd/TypeSwitch/releases/download/#{ENV.fetch("GITHUB_REF_NAME")}/#{ENV.fetch("ASSET_NAME")}\"")
          content.gsub!(/depends_on macos: ".*"/, "depends_on macos: \">= :sonoma\"")
          File.write(path, content)
          RUBY

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/typeswitch.rb

          if git diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi

          git commit -m "Update TypeSwitch cask to ${GITHUB_REF_NAME}"
          git push
