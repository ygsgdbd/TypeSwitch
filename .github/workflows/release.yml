name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: release_tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid release tag::Production releases must use vX.Y.Z, for example v0.4.0. Got ${GITHUB_REF_NAME}."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      
      - name: Install Tuist
        run: |
          brew install tuist
      
      - name: Generate Xcode Project
        env:
          TUIST_APP_VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          # 生成基于时间戳的构建号（格式：YYYYMMDDHHmm）
          TUIST_BUILD_VERSION=$(date -u "+%Y%m%d%H%M")
          export TUIST_BUILD_VERSION
          echo "App version set to: $TUIST_APP_VERSION"
          echo "Build number set to: $TUIST_BUILD_VERSION"
          tuist generate --no-open

      - name: Test
        run: |
          xcodebuild test \
            -project TypeSwitch.xcodeproj \
            -scheme TypeSwitch \
            -destination "platform=macOS" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      
      - name: Archive App
        run: |
          xcodebuild \
            -project TypeSwitch.xcodeproj \
            -scheme TypeSwitch \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath ./DerivedData/Archives/TypeSwitch.xcarchive \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64"

      - name: Verify Universal Binary
        run: |
          BINARY_PATH="DerivedData/Archives/TypeSwitch.xcarchive/Products/Applications/TypeSwitch.app/Contents/MacOS/TypeSwitch"
          ARCHS=$(lipo -archs "$BINARY_PATH")
          echo "TypeSwitch architectures: $ARCHS"

          if [[ " $ARCHS " != *" arm64 "* || " $ARCHS " != *" x86_64 "* ]]; then
            echo "::error title=Invalid binary architectures::Expected universal binary with arm64 and x86_64, got: $ARCHS"
            exit 1
          fi
      
      - name: Package App
        run: |
          mkdir -p DerivedData/Exports
          ditto DerivedData/Archives/TypeSwitch.xcarchive/Products/Applications/TypeSwitch.app DerivedData/Exports/TypeSwitch.app
          cd DerivedData/Exports
          ditto -c -k --sequesterRsrc --keepParent TypeSwitch.app ../../TypeSwitch-macOS-universal.zip

      - name: Prepare release notes
        run: |
          if ! awk -v version="${GITHUB_REF_NAME}" '
            $0 == "## " version {
              found = 1
              next
            }
            found && /^## / {
              exit
            }
            found {
              lines[++count] = $0
            }
            END {
              if (!found) {
                exit 2
              }

              start = 1
              while (start <= count && lines[start] ~ /^[[:space:]]*$/) {
                start++
              }

              end = count
              while (end >= start && lines[end] ~ /^[[:space:]]*$/) {
                end--
              }

              if (end < start) {
                exit 3
              }

              for (i = start; i <= end; i++) {
                print lines[i]
              }
            }
          ' CHANGELOG.md > release-notes.md; then
            echo "::error title=Missing release notes::CHANGELOG.md must contain a non-empty ## ${GITHUB_REF_NAME} section."
            exit 1
          fi

          echo "Release notes for ${GITHUB_REF_NAME}:"
          cat release-notes.md

      - name: Render Sparkle release notes HTML
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api markdown \
            --method POST \
            -F text=@release-notes.md \
            -f mode=gfm \
            -f context="${GITHUB_REPOSITORY}" \
            > release-notes.html

          if [[ ! -s release-notes.html ]]; then
            echo "::error title=Missing rendered release notes::GitHub Markdown API returned an empty release-notes.html file."
            exit 1
          fi

          echo "Rendered Sparkle release notes HTML:"
          cat release-notes.html
      
      - name: Generate Checksums
        run: |
          echo "### SHA-256 Checksums" > checksums.txt
          echo "\`\`\`" >> checksums.txt
          shasum -a 256 TypeSwitch-macOS-universal.zip >> checksums.txt
          echo "\`\`\`" >> checksums.txt

          {
            echo "## TypeSwitch ${{ github.ref_name }}"
            echo ""
            cat release-notes.md
            echo ""
            echo "### Build"
            echo ""
            echo "- Universal Binary (Apple Silicon + Intel)"
            echo "- macOS 14.0+"
            echo ""
            cat checksums.txt
          } > release-body.md

      - name: Download Sparkle tools
        run: |
          curl -fsSL -o Sparkle-2.9.4.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz
          mkdir -p sparkle-tools
          tar -xf Sparkle-2.9.4.tar.xz -C sparkle-tools --strip-components=1

      - name: Generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_ED_PRIVATE_KEY" ]]; then
            echo "::error title=Missing Sparkle signing key::Set the SPARKLE_ED_PRIVATE_KEY repository secret before publishing a release."
            exit 1
          fi

          mkdir -p DerivedData/SparkleFeed
          cp TypeSwitch-macOS-universal.zip DerivedData/SparkleFeed/
          cp release-notes.html DerivedData/SparkleFeed/TypeSwitch-macOS-universal.html

          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | ./sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/ygsgdbd/TypeSwitch/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/ygsgdbd/TypeSwitch" \
            --embed-release-notes \
            --maximum-versions 1 \
            DerivedData/SparkleFeed

          cp DerivedData/SparkleFeed/appcast.xml appcast.xml
      
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TypeSwitch-macOS-universal.zip
            checksums.txt
            appcast.xml
          body_path: release-body.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ygsgdbd/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        env:
          ASSET_NAME: TypeSwitch-macOS-universal.zip
          VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          SHA256=$(shasum -a 256 "$ASSET_NAME" | awk '{print $1}')
          CASK_PATH="homebrew-tap/Casks/typeswitch.rb"

          export VERSION SHA256 CASK_PATH
          ruby <<'RUBY'
          path = ENV.fetch("CASK_PATH")
          content = File.read(path)
          content.gsub!(/version ".*"/, "version \"#{ENV.fetch("VERSION")}\"")
          content.gsub!(/sha256 ".*"/, "sha256 \"#{ENV.fetch("SHA256")}\"")
          content.gsub!(%r{url ".*"}, "url \"https://github.com/ygsgdbd/TypeSwitch/releases/download/#{ENV.fetch("GITHUB_REF_NAME")}/#{ENV.fetch("ASSET_NAME")}\"")
          content.gsub!(/depends_on macos: ".*"/, "depends_on macos: \">= :sonoma\"")
          File.write(path, content)
          RUBY

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/typeswitch.rb

          if git diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi

          git commit -m "Update TypeSwitch cask to ${GITHUB_REF_NAME}"
          git push
